<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AutoMech 2.0 — IUT Automobile Society Motor Festival</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="scroll-progress" id="scrollProgress"></div>

<nav>
  <a href="#hero" class="nav-logo-link">
  <img src="AutoMechLogo.png" alt="AutoMech 2.0" class="nav-logo-img" />
</a>

  <ul class="nav-links">
    <li><a href="#events">Events</a></li>
    <li><a href="#schedule">Schedule</a></li>
    <li><a href="#gallery">Gallery</a></li>
    <li><a href="#sponsors">Sponsors</a></li>
    <li><a href="#connect">Connect</a></li>
    <li><a href="#events" class="nav-cta">Register Now</a></li>
  </ul>
  <button class="nav-burger" id="navBurger" aria-label="Toggle menu">
    <span></span><span></span><span></span>
  </button>
</nav>

<div class="mobile-nav" id="mobileNav">
  <a href="#events"    onclick="closeMobileNav()">Events</a>
  <a href="#schedule"  onclick="closeMobileNav()">Schedule</a>
  <a href="#gallery"  onclick="closeMobileNav()">Gallery</a>
  <a href="#sponsors" onclick="closeMobileNav()">Sponsors</a>
  <a href="#connect"  onclick="closeMobileNav()">Connect</a>
  <a href="#events" onclick="closeMobileNav()" class="mob-cta">Register Now</a>
</div>

<div id="main-container"></div>
<div id="events-container"></div>
<div id="schedule-container"></div>
<div id="highlight-container"></div>
<div id="sponsors-container"></div>
<div id="connect-container"></div>
<div id="tailer-container"></div>

<script src="script.js"></script>

<script>
  async function loadSiteComponents() {
    const sections = [
      { id: 'main-container', file: 'main.html' },
      { id: 'events-container',   file: 'events.html'   },
      { id: 'schedule-container', file: 'schedule.html' },
      { id: 'highlight-container', file: 'highlight.html' },
      { id: 'connect-container', file: 'connect.html' },
      { id: 'tailer-container', file: 'tailer.html' }
    ];

    // Load main sections sequentially
    for (const section of sections) {
      const response = await fetch(section.file);
      const html = await response.text();
      document.getElementById(section.id).innerHTML = html;
    }

    // Load the isolated countdown into the main/hero section
    const cdResponse = await fetch('countDown.html');
    const cdHtml = await cdResponse.text();
    document.getElementById('countdown-injector').innerHTML = cdHtml;

    // Initialize all logic after DOM is fully constructed
    if (typeof initWebsite === 'function') {
      initWebsite();
    }
  }

  loadSiteComponents();
</script>
</body>
</html>
